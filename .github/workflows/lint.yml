# Canonical lint workflow for zensical docs repos.
# Thin caller of LukeEvansTech/shared-workflows super-linter reusable.
# Replace 8686a4592fa5c8612a69edd3d864bd3cc09aecb0 with the shared-workflows main SHA (automated by rollout_zensical_standard.py).
name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  pull-requests: write

jobs:
  lint:
    uses: LukeEvansTech/shared-workflows/.github/workflows/super-linter.yml@c0a84f2a9f307fdfa394681ab5ff30f7de78b702 # v1
    with:
      soft-launch: false
