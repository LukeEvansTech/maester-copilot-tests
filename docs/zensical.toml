# Zensical Configuration — maester-copilot-tests
[project]
site_name = "maester-copilot-tests"
site_description = "Custom Maester tests for Microsoft 365 Copilot security controls"
site_author = "Luke Evans"
site_url = "https://lukeevanstech.github.io/maester-copilot-tests/"
copyright = "Copyright © 2026 Luke Evans"

docs_dir = "docs"
site_dir = "site"
use_directory_urls = true
dev_addr = "localhost:8000"

[project.theme]
name = "material"
variant = "modern"
language = "en"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue"
accent = "light-blue"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue"
accent = "light-blue"

[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

repo_url = "https://github.com/LukeEvansTech/maester-copilot-tests/"
repo_name = "LukeEvansTech/maester-copilot-tests"
edit_uri = "edit/main/docs/docs"

[[nav]]
Home = "index.md"

[[nav]]
"Tests" = [
  { "Sensitivity labels" = "tests/sensitivity-labels.md" },
  { "Audit logging" = "tests/audit-logging.md" },
  { "Restricted SharePoint search" = "tests/restricted-search.md" }
]

[markdown_extensions]
admonition = {}
toc = { permalink = true }
